<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autodiagnóstico de Sostenibilidad · Sello PRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--green:#35D38B;--green-d:#27b475;--green-dd:#1d9c64;--ink:#343434;--ink-soft:#5a605d;--muted:#9aa09c;
--bg:#eef1ef;--card:#fff;--line:#e7eae8;--star:#FFC23B;--radius:18px;--shadow:0 10px 30px rgba(20,40,30,.08);--maxw:960px;}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:'Poppins',system-ui,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}.hidden{display:none!important}button{font-family:inherit;cursor:pointer;border:none}
#view-intro{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 120% at 80% 0%,#45e29a 0%,var(--green) 45%,var(--green-dd) 100%);position:relative;overflow:hidden;padding:40px 0}
.bracket{position:absolute;width:120px;height:120px;border:7px solid rgba(255,255,255,.18)}
.bracket.tl{top:40px;left:40px;border-right:none;border-bottom:none;border-radius:6px 0 0 0}
.bracket.br{bottom:40px;right:40px;border-left:none;border-top:none;border-radius:0 0 6px 0}
.intro-card{text-align:center;color:#fff;padding:20px;max-width:660px;z-index:2;width:100%}
.intro-card img{width:180px;max-width:52vw;margin-bottom:18px;filter:drop-shadow(0 8px 18px rgba(0,0,0,.12))}
.intro-card h1{font-size:clamp(25px,4.6vw,40px);font-weight:800;letter-spacing:-.5px;margin-bottom:10px}
.intro-card .lead{font-size:clamp(14px,2.2vw,17px);font-weight:400;opacity:.95;max-width:500px;margin:0 auto 22px}
.panel{background:#fff;color:var(--ink);border-radius:22px;padding:24px 24px 26px;box-shadow:0 18px 44px rgba(0,0,0,.18);text-align:left}
.panel .step{font-size:12.5px;font-weight:700;letter-spacing:.4px;color:var(--green-dd);text-transform:uppercase;margin:4px 0 12px;display:flex;align-items:center;gap:8px}
.panel .step .n{width:22px;height:22px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px}
.opt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.size-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:6px}
.chip{background:#f4f6f5;border:1.6px solid var(--line);border-radius:13px;padding:13px 10px;font-size:13.5px;font-weight:600;color:var(--ink-soft);text-align:center;transition:.14s;line-height:1.25}
.chip:hover{border-color:var(--green);color:var(--ink)}
.chip.sel{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 8px 18px rgba(53,211,139,.35)}
.btn-start{background:#fff;color:var(--green-dd);font-weight:700;font-size:17px;padding:15px 44px;border-radius:999px;margin-top:24px;box-shadow:0 12px 28px rgba(0,0,0,.18);transition:transform .15s,box-shadow .15s,opacity .15s}
.btn-start:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 16px 34px rgba(0,0,0,.24)}
.btn-start:disabled{opacity:.45;cursor:not-allowed}
.intro-foot{margin-top:18px;font-size:12px;opacity:.85;font-weight:500;letter-spacing:.3px;min-height:18px}
@media(max-width:520px){.opt-grid{grid-template-columns:repeat(2,1fr)}}
.topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.topbar-in{display:flex;align-items:center;gap:16px;padding:12px 0}
.brandmark{display:flex;align-items:center;gap:10px;font-weight:800;color:var(--green-dd);font-size:15px;letter-spacing:.4px}
.brandmark .dot{width:30px;height:30px;border-radius:9px;background:var(--green);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.brandmark .dot img{width:22px}
.progress-wrap{flex:1;display:flex;flex-direction:column;gap:5px;min-width:120px}
.progress-track{height:8px;background:var(--line);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:999px;width:0;transition:width .4s ease}
.progress-meta{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);font-weight:500}
.profile-tag{font-size:11.5px;font-weight:600;color:var(--ink-soft);background:#f0f3f1;border:1px solid var(--line);padding:5px 11px;border-radius:999px;white-space:nowrap}
#view-quiz{padding-bottom:120px}
.pillar-head{border-radius:var(--radius);padding:26px 28px;color:#fff;margin:26px 0 18px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.pillar-head .eyebrow{font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;opacity:.85}
.pillar-head h2{font-size:clamp(22px,3.6vw,32px);font-weight:800;margin-top:4px}
.pillar-head .cnt{font-size:13.5px;opacity:.9;margin-top:6px;font-weight:500}
.pillar-head .ghost{position:absolute;right:-10px;top:-30px;font-size:150px;font-weight:800;opacity:.12;line-height:1}
.crit{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 22px 12px;margin-bottom:18px;border-left:6px solid var(--pc)}
.crit-title{font-size:16.5px;font-weight:700;margin-bottom:4px}
.crit-sub{font-size:12.5px;color:var(--muted);margin-bottom:16px;font-weight:500}
.opt{display:flex;gap:14px;align-items:flex-start;padding:13px 14px;border:1.5px solid var(--line);border-radius:13px;margin-bottom:9px;cursor:pointer;transition:border-color .15s,background .15s;background:#fff}
.opt:hover{border-color:var(--pc);background:color-mix(in srgb,var(--pc) 5%,#fff)}
.opt.sel{border-color:var(--pc);background:color-mix(in srgb,var(--pc) 11%,#fff)}
.opt.sel .lvl{background:var(--pc);color:#fff}
.opt .lvl{flex:0 0 auto;width:34px;height:34px;border-radius:9px;background:var(--line);color:var(--ink-soft);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;transition:.15s}
.opt .obody{flex:1}.opt .ostars{font-size:13px;letter-spacing:1px;margin-bottom:3px}
.opt .otext{font-size:13.5px;color:var(--ink-soft);font-weight:400}.opt.sel .otext{color:var(--ink)}
.stars{position:relative;display:inline-block;font-family:Arial,sans-serif;white-space:nowrap;line-height:1}
.stars .bg{color:#dfe3e0}.stars .fg{position:absolute;left:0;top:0;overflow:hidden;color:var(--star);width:var(--p,0%)}
.navbar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid var(--line);z-index:30}
.navbar-in{max-width:var(--maxw);margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:12px}
.btn{padding:13px 26px;border-radius:999px;font-weight:700;font-size:15px;transition:.15s}
.btn-ghost{background:#fff;color:var(--ink-soft);border:1.5px solid var(--line)}
.btn-ghost:hover{border-color:var(--muted);color:var(--ink)}.btn-ghost:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--green);color:#fff;box-shadow:0 8px 20px rgba(53,211,139,.4)}.btn-primary:hover{background:var(--green-d)}
.nav-spacer{flex:1}.nav-info{font-size:12.5px;color:var(--muted);font-weight:600}
.dots{display:flex;gap:7px;justify-content:center;margin:4px 0 22px;flex-wrap:wrap}
.dot-pill{width:11px;height:11px;border-radius:50%;background:var(--line);cursor:pointer;transition:.15s;border:2px solid transparent}
.dot-pill.done{background:var(--pcd)}.dot-pill.active{transform:scale(1.45);box-shadow:0 0 0 3px rgba(0,0,0,.05)}
#view-results{padding:34px 0 80px}
.res-head{text-align:center;margin-bottom:8px}
.res-head .eyebrow{font-size:12.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--green-dd)}
.res-head h2{font-size:clamp(24px,4vw,36px);font-weight:800;margin-top:4px}
.res-head .prof{font-size:13.5px;color:var(--ink-soft);font-weight:600;margin-top:6px}
.score-card{background:linear-gradient(135deg,var(--green) 0%,var(--green-dd) 100%);color:#fff;border-radius:24px;padding:38px 24px;text-align:center;box-shadow:var(--shadow);margin:22px 0 12px;position:relative;overflow:hidden}
.score-card .ghost{position:absolute;inset:0;background:radial-gradient(80% 80% at 85% 10%,rgba(255,255,255,.18),transparent 60%)}
.score-num{font-size:64px;font-weight:800;line-height:1;position:relative}.score-num small{font-size:24px;font-weight:600;opacity:.8}
.score-stars{font-size:40px;margin:10px 0 6px;position:relative}.score-label{font-size:14px;opacity:.92;font-weight:500;position:relative}
.answered-note{text-align:center;font-size:13px;color:var(--muted);margin-bottom:26px;font-weight:500}
.pilres{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:8px 22px;margin-bottom:26px}
.pilrow{display:flex;align-items:center;gap:16px;padding:15px 0;border-bottom:1px solid var(--line)}.pilrow:last-child{border-bottom:none}
.pilrow .pdot{width:14px;height:14px;border-radius:50%;flex:0 0 auto;background:var(--pc)}
.pilrow .pname{flex:0 0 210px;font-weight:600;font-size:14px}.pilrow .pname small{display:block;color:var(--muted);font-weight:500;font-size:11px}
.pilrow .pbar{flex:1;height:12px;background:var(--line);border-radius:999px;overflow:hidden}
.pilrow .pbar i{display:block;height:100%;border-radius:999px;background:var(--pc);width:0;transition:width .8s ease}
.pilrow .pval{flex:0 0 96px;text-align:right;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;justify-content:flex-end}.pilrow .pval .mini{font-size:11px}
.res-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px}
@media(max-width:560px){.pilrow{flex-wrap:wrap}.pilrow .pname{flex:1 1 auto}.pilrow .pbar{flex:1 1 100%;order:3}.brandmark span.txt{display:none}}
@media print{.navbar,.topbar,.res-actions,.dots{display:none!important}body{background:#fff}.score-card{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style></head><body>

  const sk=segKey(); if(!sk)return null;
  let pil=0,cri=0;
  PILLARS.forEach(p=>{const n=p.criterios.filter(c=>c.niveles[sk]&&c.niveles[sk].length).length; if(n){pil++;cri+=n;}});
  return {pil,cri};
}

function initIntro(){
  document.getElementById('type-grid').innerHTML=TYPES.map(t=>`<button class="chip" onclick="pickType(this,'${t.replace(/'/g,"\\'")}')">${t}</button>`).join('');
  document.getElementById('size-grid').innerHTML=SIZES.map(s=>`<button class="chip" onclick="pickSize(this,'${s.replace(/'/g,"\\'")}')">${s}</button>`).join('');
}
function pickType(el,t){selTipo=t;document.querySelectorAll('#type-grid .chip').forEach(c=>c.classList.toggle('sel',c===el));checkReady();}
function pickSize(el,s){selTam=s;document.querySelectorAll('#size-grid .chip').forEach(c=>c.classList.toggle('sel',c===el));checkReady();}
function checkReady(){
  const ready=!!(selTipo&&selTam);
  document.getElementById('btn-start').disabled=!ready;
  const f=document.getElementById('intro-foot');
  if(ready){const c=countFor();f.textContent=`Tu perfil evalúa ${c.cri} criterios en ${c.pil} pilares · escala de 1 a 5 estrellas`;}
  else f.textContent='Selecciona tipo y tamaño para comenzar';
}

function buildActive(){
  ACTIVE=PILLARS.map(p=>({pilar:p.pilar,color:p.color,
      criterios:p.criterios.filter(c=>c.niveles[seg]&&c.niveles[seg].length)
                          .map(c=>({criterio:c.criterio,niveles:c.niveles[seg]}))}))
    .filter(p=>p.criterios.length);
  TOTAL=ACTIVE.reduce((s,p)=>s+p.criterios.length,0);
}
function start(){
  if(!(selTipo&&selTam))return;
  seg=segKey();buildActive();
  for(const k in answers)delete answers[k];
  document.getElementById('profile-tag').textContent=profileLabel();
  document.getElementById('view-intro').classList.add('hidden');
  document.getElementById('view-quiz').classList.remove('hidden');
  cur=0;renderDots();renderPillar();
}
function renderDots(){
  document.getElementById('dots').innerHTML=ACTIVE.map((p,i)=>{
    const done=p.criterios.every((_,ci)=>answers[ckey(i,ci)]!==undefined);
    return `<span class="dot-pill ${i===cur?'active':''} ${done?'done':''}" style="--pc:${p.color};--pcd:${p.color}" onclick="gotoPillar(${i})"></span>`;}).join('');
}
function renderPillar(){
  const p=ACTIVE[cur];
  let html=`<div class="pillar-head" style="background:${p.color}"><div class="ghost">${cur+1}</div>
    <div class="eyebrow">Pilar ${cur+1} de ${ACTIVE.length}</div><h2>${p.pilar}</h2>
    <div class="cnt">${p.criterios.length} criterio(s) · selecciona el nivel que mejor describe a tu empresa</div></div>`;
  p.criterios.forEach((c,ci)=>{
    const sel=answers[ckey(cur,ci)];
    html+=`<div class="crit" style="--pc:${p.color}"><div class="crit-title">${c.criterio}</div>
      <div class="crit-sub">¿Cuál refleja mejor tu realidad actual?</div>`;
    c.niveles.forEach((txt,li)=>{const lvl=li+1,isSel=sel===lvl;
      html+=`<div class="opt ${isSel?'sel':''}" style="--pc:${p.color}" onclick="select(${cur},${ci},${lvl})">
        <div class="lvl">${lvl}</div><div class="obody"><div class="ostars">${starMeter(lvl)}</div><div class="otext">${txt}</div></div></div>`;});
    html+=`</div>`;});
  document.getElementById('quiz-body').innerHTML=html;
  window.scrollTo({top:0,behavior:'smooth'});updateBars();
}
function select(p,c,lvl){answers[ckey(p,c)]=lvl;renderPillar();renderDots();}
function updateBars(){
  const ans=answeredCount();
  document.getElementById('pfill').style.width=(TOTAL?ans/TOTAL*100:0)+'%';
  document.getElementById('pmeta-left').textContent=`Pilar ${cur+1} de ${ACTIVE.length}`;
  document.getElementById('pmeta-right').textContent=`${ans}/${TOTAL} respondidas`;
  document.getElementById('nav-info').textContent=`${ans}/${TOTAL} respondidas`;
  document.getElementById('btn-prev').disabled=(cur===0);
  document.getElementById('btn-next').textContent=(cur===ACTIVE.length-1)?'Ver resultados →':'Siguiente →';
}
function gotoPillar(i){cur=i;renderDots();renderPillar();}
function prevPillar(){if(cur>0){cur--;renderDots();renderPillar();}}
function nextPillar(){if(cur<ACTIVE.length-1){cur++;renderDots();renderPillar();}else showResults();}
function pillarAvg(pi){const p=ACTIVE[pi];let s=0,n=0;p.criterios.forEach((_,ci)=>{const v=answers[ckey(pi,ci)];if(v!==undefined){s+=v;n++;}});return n?s/n:null;}
function globalAvg(){let s=0,n=0;ACTIVE.forEach((p,pi)=>p.criterios.forEach((_,ci)=>{const v=answers[ckey(pi,ci)];if(v!==undefined){s+=v;n++;}}));return n?s/n:0;}
function showResults(){
  if(answeredCount()===0){alert('Responde al menos un criterio para ver tu resultado.');return;}
  document.getElementById('view-quiz').classList.add('hidden');
  document.getElementById('view-results').classList.remove('hidden');
  const g=globalAvg();
  document.getElementById('res-prof').textContent='Perfil: '+profileLabel();
  document.getElementById('score-num').innerHTML=`${g.toFixed(1)}<small> / 5</small>`;
  document.getElementById('score-stars').innerHTML=starMeter(g);
  const ans=answeredCount();
  document.getElementById('answered-note').textContent=ans<TOTAL?`Basado en ${ans} de ${TOTAL} criterios aplicables a tu perfil.`:`Basado en los ${TOTAL} criterios aplicables a tu perfil.`;
  document.getElementById('pilres').innerHTML=ACTIVE.map((p,pi)=>{
    const a=pillarAvg(pi),w=a?(a/5*100):0,val=a?a.toFixed(1):'–';
    return `<div class="pilrow" style="--pc:${p.color}"><span class="pdot"></span>
      <span class="pname">${p.pilar}<small>${p.criterios.length} criterio(s)</small></span>
      <span class="pbar"><i style="width:${w}%"></i></span>
      <span class="pval">${val} <span class="mini">${a?starMeter(a):''}</span></span></div>`;}).join('');
  window.scrollTo({top:0,behavior:'smooth'});
}
function restart(){
  for(const k in answers)delete answers[k];
  cur=0;selTipo=null;selTam=null;seg=null;ACTIVE=[];TOTAL=0;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));checkReady();
  document.getElementById('view-results').classList.add('hidden');
  document.getElementById('view-quiz').classList.add('hidden');
  document.getElementById('view-intro').classList.remove('hidden');
  window.scrollTo({top:0});
}
initIntro();checkReady();
</script></body></html>
